apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama-mcp
  namespace: ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama-mcp
  template:
    metadata:
      labels:
        app: ollama-mcp
    spec:
      initContainers:
        - name: clone-repo
          image: alpine/git:latest
          command: ["git", "clone", "https://github.com/jayluxferro/ollama-mcp.git", "/app"]
          volumeMounts:
            - name: app-src
              mountPath: /app
      containers:
        - name: ollama-mcp
          image: python:3.12-slim
          command: ["sh", "-c", "pip install --no-cache-dir uv && cd /app && uv sync --frozen --no-dev && uv run server.py"]
          workingDir: /app
          ports:
            - containerPort: 8000
          env:
            - name: OLLAMA_BASE_URL
              value: http://ollama-svc.ai.svc.cluster.local:11434
            - name: OLLAMA_MCP_TRANSPORT
              value: streamable-http
            - name: OLLAMA_MCP_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MCP_PORT
              value: "8000"
          volumeMounts:
            - name: app-src
              mountPath: /app
      volumes:
        - name: app-src
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-mcp-svc
  namespace: ai
spec:
  selector:
    app: ollama-mcp
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30800
  type: NodePort
